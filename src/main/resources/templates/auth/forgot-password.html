<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container auth">
    <section class="panel">
        <h1>Reset Password</h1>
        <p>Enter your email and new password. This simulates the reset link workflow.</p>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/forgot-password}" method="post">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">New Password</label>
            <input id="password" name="password" type="password" required minlength="6" maxlength="60">

            <div class="actions">
                <button type="submit">Reset Password</button>
                <a th:href="@{/login}">Back to login</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
